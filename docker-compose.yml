services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: domain_checker
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"

  app:
    build: ./docker/php
    image: domain-checker-app
    volumes:
      - ./src:/var/www

  nginx:
    image: nginx:alpine
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8000:80"

  reverb:
    build: ./docker/php
    image: domain-checker-app
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - ./src:/var/www
    ports:
      - "8080:8080"

  scheduler:
    build: ./docker/php
    image: domain-checker-app
    command: php artisan schedule:work
    volumes:
      - ./src:/var/www

volumes:
  mysql_data:
